          <!-- Right leaf cluster mirror -->
          <path d="M185,15 C182,10 175,8 172,12 C175,16 182,16 185,15 Z" fill="#2d4a2d" opacity="0.6"/>
          <path d="M185,15 C182,20 175,22 172,18 C175,14 182,14 185,15 Z" fill="#3a5a3a" opacity="0.5"/>
          <circle cx="170" cy="15" r="2.5" fill="#8b2020" opacity="0.8"/>
          <circle cx="164" cy="13" r="2" fill="#8b2020" opacity="0.7"/>
          <line x1="190" y1="15" x2="300" y2="15" stroke="#b5892a" stroke-width="0.7" opacity="0.6"/>
        </svg>
      </div>

      <p class="iban-label">IBAN</p>
      <p class="iban-number">{{ iban }}</p>

      <div class="titular-line" aria-hidden="true">
        <svg viewBox="0 0 160 12" xmlns="http://www.w3.org/2000/svg" width="160">
          <line x1="0" y1="6" x2="65" y2="6" stroke="#b5892a" stroke-width="0.6" opacity="0.5"/>
          <circle cx="80" cy="6" r="3" fill="#b5892a" opacity="0.6"/>
          <line x1="95" y1="6" x2="160" y2="6" stroke="#b5892a" stroke-width="0.6" opacity="0.5"/>
        </svg>
      </div>

      <p class="titular-text">Titular: {{ titular }}</p>

      <!-- Copy button -->
      <button
        class="copy-btn"
        [class.copied]="copied()"
        (click)="copyIban()"
        [attr.aria-label]="copied() ? 'IBAN copiado' : 'Copiar IBAN al portapapeles'"
        type="button">

        <span class="copy-icon" aria-hidden="true">
          <svg *ngIf="!copied()" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <rect x="9" y="9" width="13" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <svg *ngIf="copied()" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>

        <span class="copy-text">{{ copied() ? '¡Copiado!' : 'Copiar IBAN' }}</span>
      </button>

    </div>
  </div>

  <!-- Bottom ornament -->
  <footer class="regalo-footer" aria-hidden="true">
    <svg viewBox="0 0 300 24" xmlns="http://www.w3.org/2000/svg" width="300">
      <line x1="0" y1="12" x2="120" y2="12" stroke="#b5892a" stroke-width="0.8" opacity="0.5"/>
      <text x="150" y="16" text-anchor="middle" font-size="10" fill="#b5892a" opacity="0.8">♥</text>
      <line x1="180" y1="12" x2="300" y2="12" stroke="#b5892a" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </footer>

</section>
